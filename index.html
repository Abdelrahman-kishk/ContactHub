<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContactHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styeshet.css">
</head>
<body>


  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container-fluid px-3 px-md-4">
      <a class="navbar-brand app-brand" href="#">
        <span class="brand-tab">
          <i class="bi bi-journal-bookmark-fill"></i>
        </span>
        ContactHub
      </a>
      <div class="d-flex align-items-center gap-2">
        <span class="navbar-count" id="totalCountBadge">0 contacts</span>
      </div>
    </div>
  </nav>

  <main class="container py-4">

    <div class="control-bar">
      <div class="row g-3 align-items-center">
        <div class="col-12 col-lg-5">
          <div class="search-wrap">
            <i class="bi bi-search"></i>
            <input type="text" class="form-control search-input" id="searchInput" placeholder="Search by name, phone, or email" oninput="searchContacts()">
          </div>
        </div>
        <div class="col-6 col-lg-4">
          <div class="btn-group view-toggle" role="group">
            <input type="radio" class="btn-check" name="viewFilter" id="viewAll" checked onclick="filterView('all')">
            <label class="btn" for="viewAll"><i class="bi bi-grid-3x3-gap"></i> All</label>
            <input type="radio" class="btn-check" name="viewFilter" id="viewFavorites" onclick="filterView('favorites')">
            <label class="btn" for="viewFavorites"><i class="bi bi-star-fill"></i> Favorites</label>
          </div>
        </div>
        <div class="col-6 col-lg-3 text-end">
          <button type="button" class="btn add-contact-btn w-100" data-bs-toggle="modal" data-bs-target="#contactModal" onclick="openAddModal()">
  <i class="bi bi-person-plus-fill"></i> Add Contact
</button>
        </div>
      </div>
    </div>

    <div class="row g-4 mt-1" id="contactsGrid"></div>

    <div class="empty-state d-none" id="emptyState">
      <i class="bi bi-inbox"></i>
      <h5>No contacts to show</h5>
      <p id="emptyStateText">Add your first contact to get started.</p>
    </div>

  </main>

  <div class="modal fade" id="contactModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content contact-modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitleText">Add Contact</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="contactForm">
            <input type="hidden" id="contactId">

            <div class="mb-3">
              <label class="form-label" for="contactName">Full name</label>
              <input type="text" class="form-control" id="contactName" placeholder="Jordan Alvarez">
            </div>

            <div class="mb-3">
              <label class="form-label" for="contactPhone">Phone number</label>
              <input type="tel" class="form-control" id="contactPhone" placeholder="+1 555 123 4567">
            </div>

            <div class="mb-3">
              <label class="form-label" for="contactEmail">Email address</label>
              <input type="email" class="form-control" id="contactEmail" placeholder="jordan@example.com">
            </div>

            <div class="mb-3">
              <label class="form-label" for="contactCategory">Group</label>
              <select class="form-select" id="contactCategory">
                <option value="" disabled selected>Choose a group</option>
                <option value="Family">Family</option>
                <option value="Friends">Friends</option>
                <option value="Work">Work</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-check favorite-check">
              <input class="form-check-input" type="checkbox" id="contactFavorite">
              <label class="form-check-label" for="contactFavorite">
                <i class="bi bi-star-fill"></i> Mark as favorite
              </label>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-cancel" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-save" onclick="saveContact()">Save contact</button>
        </div>
      </div>
    </div>
  </div>


   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 <script src="./java/index.js"></script>
</body>
</html>
