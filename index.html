<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Contacts Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="./css/styeshet.css">
<link rel="stylesheet" href="./css/bootstrap.min.css">
</head>
<body>

  <header class="main-header py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <h3 class="logo-title m-0">
        <i class="bi bi-person-lines-fill me-2"></i>My Contacts
      </h3>
      <span class="badge text-bg-primary fs-6" id="totalCounter">0 Contacts</span>
    </div>
  </header>

  <main class="container py-4">

    <div class="filter-box p-3 mb-4">
      <div class="row g-3">
        <div class="col-12 col-md-5">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="searchBox" class="form-control" placeholder="Search contact name or phone..." oninput="searchData()">
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="btn-group w-100" role="group">
            <button type="button" class="btn btn-outline-light active" id="btnShowAll" onclick="changeFilter('all')">All</button>
            <button type="button" class="btn btn-outline-light" id="btnShowFav" onclick="changeFilter('fav')"><i class="bi bi-star-fill text-warning me-1"></i>Favorites</button>
          </div>
        </div>

        <div class="col-12 col-md-3">
          <button type="button" class="btn btn-success w-100 fw-bold" data-bs-toggle="modal" data-bs-target="#contactModal" onclick="prepareAddForm()">
            <i class="bi bi-plus-lg me-1"></i> Add New Contact
          </button>
        </div>
      </div>
    </div>

    <div class="row g-3" id="contactsList"></div>

    <div class="text-center py-5 d-none" id="noDataAlert">
      <i class="bi bi-folder-x display-1 text-muted"></i>
      <h4 class="mt-3 text-muted">No contacts found!</h4>
    </div>

  </main>

  <div class="modal fade" id="contactModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content text-dark">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title" id="formTitle">Add New Contact</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="userForm">
            <input type="hidden" id="editIndex">

            <div class="mb-3">
              <label class="form-label font-semibold">Name</label>
              <input type="text" id="inputName" class="form-control" placeholder="e.g. Ahmed Ali">
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="text" id="inputPhone" class="form-control" placeholder="01012345678">
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="inputEmail" class="form-control" placeholder="example@mail.com">
            </div>

            <div class="mb-3">
              <label class="form-label">Group</label>
              <select id="inputGroup" class="form-select">
                <option value="">-- Choose Category --</option>
                <option value="Family">Family</option>
                <option value="Friends">Friends</option>
                <option value="Work">Work</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="inputFav">
              <label class="form-check-label" for="inputFav">
                Add to Favorites
              </label>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" onclick="saveData()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./java/index.js"></script>
</body>
</html>
